<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artic Coffee - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-screen flex items-center justify-center p-4">
    <div
      class="relative w-full max-w-6xl flex flex-col md:flex-row items-center gap-12"
    >
      <div class="relative w-full md:w-1/2 h-[450px]">
        <a href="login.html">

            <button "
              class="absolute top-0 left-[-20px] z-20 flex h-12 w-20 items-center justify-end pr-4 rounded-full bg-[#B9D9EB]/60 backdrop-blur-sm transition-hover hover:bg-[#B9D9EB]"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="3"
                stroke="currentColor"
                class="w-5 h-5 text-gray-400"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 19.5L8.25 12l7.5-7.5"
                />
              </svg>
            </button>
        </a>

        <div class="relative right-60 w-[170%] h-full z-10">
          <img
            src="/Assets/regist-element.png"
            class="w-full h-full object-cover"
          />
        </div>

        <div class="absolute bottom-0 left-0 w-[70%] h-[60%]">
          <img
            src="/Assets/regist-element.png"
            class="w-full h-full object-cover shadow-lg"
            alt="Coffee machine"
          />
        </div>

        <div class="absolute top-500 left-15 flex items-center z-20">
          <div
            class="absolute right-[-5px] w-24 h-10 rounded-full bg-[#B9D9EB]/20"
          ></div>
          <div
            class="absolute right-[-10px] w-24 h-10 rounded-full bg-[#B9D9EB]/40"
          ></div>
          <div
            class="relative flex h-10 items-center whitespace-nowrap bg-[#B9D9EB]/80 backdrop-blur-md px-6 rounded-full text-sm font-medium text-[#5C4033]"
          >
            Join and enjoy for today!
          </div>
        </div>
      </div>

      <div class="w-full md:w-1/2 max-w-md">
        <h1 class="text-3xl font-bold text-[#B9D9EB] mb-8 justify-self-center">
          Create Your Account
        </h1>

        <form class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-gray-400 ml-1"
              >Name</label
            >
            <input
              type="text"
              class="w-full mt-1 px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#B9D9EB]/50"
            />
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-400 ml-1"
              >Tanggal Lahir</label
            >
            <input
              type="text"
              class="w-full mt-1 px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#B9D9EB]/50"
            />
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-400 ml-1"
              >Email/No. Telp</label
            >
            <input
              type="text"
              class="w-full mt-1 px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#B9D9EB]/50"
            />
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-400 ml-1"
              >Password</label
            >
            <input
              type="password"
              class="w-full mt-1 px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#B9D9EB]/50"
            />
          </div>

          <button
            type="submit"
            class="px-8 py-2 border border-gray-200 rounded-xl text-xs font-bold text-gray-600 hover:bg-gray-50 transition-all"
          >
            Daftar
          </button>

          <div
            class="py-4 text-center text-xs font-bold text-gray-400 uppercase tracking-widest"
          >
            Or
          </div>

          <button
            type="button"
            class="w-full flex items-center justify-center gap-2 border border-gray-200 py-3 rounded-xl hover:bg-gray-50 transition-all"
          >
            <img src="/Assets/Logo-Google.png" alt="Google" />
            <span class="text-sm font-bold text-[#5C4033]"
              >Sign with google</span
            >
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
