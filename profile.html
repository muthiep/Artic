<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artic Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#F5F5F5] font-sans">
    <nav
      class="max-w-6xl mx-auto mt-6 bg-[#7B5536] rounded-full px-8 py-4 flex items-center justify-between"
    >
      <img src="/Assets/logo.png" alt="logo" class="h-9" />

      <ul class="hidden md:flex gap-10 text-white text-sm">
        <li>Home</li>
        <li>About us</li>
        <li>Menu</li>
        <li>Contact</li>
      </ul>

      <button
        class="border border-white text-white px-4 py-1 rounded-full text-sm"
      >
        Get App
      </button>
    </nav>
    <section class="max-w-5xl mx-auto mt-10">
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-4">
          <img src="/Assets/profile-element.jpeg" class="w-14 h-14 rounded-full" />

          <h2 class="text-xl font-semibold text-[#5A3E2B]">Dear, Manuel</h2>
        </div>
        <img src="/Assets/edit.jpg" class="w-6 h-6 cursor-pointer" />
      </div>
      <div class="mb-10">
        <img src="/Assets/loyalty.jpeg" class="w-full rounded-xl" />
      </div>
      <div class="mb-8">
        <h3 class="text-xl font-bold text-[#5A3E2B] mb-4">Account</h3>

        <div class="space-y-4">
          <div class="flex items-center gap-4">
            <img src="/Assets/Inbox.jpeg" class="w-6 h-6" />
            <p class="text-gray-700">Inbox</p>
          </div>

          <div class="flex items-center gap-4">
            <img src="/Assets/Language.jpeg " class="w-6 h-6" />
            <p class="text-gray-700">Language</p>
          </div>
        </div>
      </div>
      <div class="mb-8">
        <h3 class="text-xl font-bold text-[#5A3E2B] mb-4">Order</h3>

        <div class="space-y-4">
          <div class="flex items-center gap-4">
            <img src="/Assets/history-element.jpeg" class="w-6 h-6" />
            <p class="text-gray-700">History</p>
          </div>

          <div class="flex items-center gap-4">
            <img src="/Assets/big-order.jpeg" class="w-6 h-6" />
            <p class="text-gray-700">Big Order</p>
          </div>
        </div>
      </div>
      <div class="mb-10">
        <h3 class="text-xl font-bold text-[#5A3E2B] mb-4">Artic Coffee</h3>

        <div class="space-y-4">
          <div class="flex items-center gap-4">
            <img src="/Assets/Faq.jpeg" class="w-6 h-6" />
            <p class="text-gray-700">Help</p>
          </div>

          <div class="flex items-center gap-4">
            <img src="/Assets/Inbox.jpeg" class="w-6 h-6" />
            <p class="text-gray-700">Customer Service</p>
          </div>
        </div>
      </div>
      <button
        class="w-full bg-[#D6C6B8] text-[#5A3E2B] py-4 rounded-xl font-semibold"
      >
        Logout
      </button>
    </section>
    <footer class="mt-20 mb-2">
      <img
        src="../asset/Group 197.png"
        alt="footer"
        class="mx-auto w-[100px] md:w-[120px]"
      />
    </footer>
  </body>
</html>
