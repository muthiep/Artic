<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artic Coffee - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-screen bg-[#f6f3ef]">
    <div class="flex h-full">
      <div class="w-1/2 h-full relative hidden md:block overflow-hidden">
        <img
          src="/Assets/Toko-Artic.jpg"
          alt="Artic Coffee Shop"
          class="w-full h-full object-cover"
        />
        <a href="landing.html">

          <button
            class="absolute top-10 left-0 -translate-x-1/2 z-20 flex w-28 h-16 items-center justify-end pr-5 rounded-full bg-[#B9D9EB]/80 backdrop-blur-sm transition-all hover:bg-[#B9D9EB] hover:pr-7 shadow-lg"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="3"
              stroke="currentColor"
              class="w-6 h-6 text-[#5C4033]"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 19.5L8.25 12l7.5-7.5"
              />
            </svg>
          </button>
        </a>

        <div class="absolute bottom-8 left-8 flex items-center">
          <div
            class="absolute right-[-20px] h-12 w-32 rounded-full bg-white/20 backdrop-blur-sm"
          ></div>
          <div
            class="absolute right-[-10px] h-12 w-32 rounded-full bg-white/40 backdrop-blur-sm"
          ></div>
          <div
            class="relative flex h-12 items-center gap-2 whitespace-nowrap bg-white/70 backdrop-blur-md px-6 py-2 rounded-full text-sm font-medium text-[#5C4033] shadow-lg border border-white/30"
          >
            Ready for your next coffee experience? ☕
          </div>
        </div>
      </div>

      <div
        class="w-full md:w-1/2 flex items-center justify-center bg-[#f6f3ef]"
      >
        <div class="w-[80%] max-w-md">
          <h1 class="text-3xl font-semibold text-blue-200 text-center mb-2">
            Welcome Back!
          </h1>
          <p class="text-center text-gray-600 mb-8">Sign In to Continue</p>

          <!-- FORM -->
          <form class="space-y-5">
            <!-- Name -->
            <div>
              <label class="text-sm text-gray-600">Name</label>
              <input
                type="text"
                class="w-full mt-1 px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-300"
              />
            </div>

            <!-- Password -->
            <div>
              <label class="text-sm text-gray-600">Password</label>
              <div class="relative">
                <input
                  type="password"
                  class="w-full mt-1 px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-300"
                />
                <button
                  type="button"
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-5 h-5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                  </svg>
                </button>
              </div>
              <p class="text-xs text-right mt-1 text-gray-500 cursor-pointer">
                Forgot Password
              </p>
            </div>

            <!-- Login Button -->
            <button
              class="px-6 py-2 border rounded-lg text-sm hover:bg-gray-200 transition"
            >
              Login
            </button>

            <!-- Divider -->
            <div class="text-center text-gray-500 text-sm">Or</div>

            <!-- Google Button -->
            <button
              type="button"
              class="w-full flex items-center justify-center gap-2 border py-3 rounded-lg hover:bg-gray-100 transition"
            >
              <img
                src="https://www.svgrepo.com/show/475656/google-color.svg"
                class="w-5"
              />
              Sign with Google
            </button>

            <!-- Sign Up -->
            <p class="text-center text-sm text-gray-600 mt-6">
              Don’t have an account?
            </p>
            <button
              type="button"
              class="w-full py-3 border rounded-lg hover:bg-gray-200 transition"
            >
              Sign Up
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
